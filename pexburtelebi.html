<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ფეხბურთელები | Football Georgia</title>
  <meta name="description" content="ფეხბურთელების სატესტო ბაზა - 1000+ მოთამაშე.">
  <style>
    :root {
      --bg: #ffffff;
      --panel: #ffffff;
      --panel-2: #f8fafc;
      --panel-3: #eef2f6;
      --text: #0b1220;
      --muted: #344054;
      --muted-2: #1f2937;
      --line: rgba(16,24,40,0.12);
      --line-2: rgba(16,24,40,0.22);
      --red: #b91c1c;
      --red-2: #991b1b;
      --black: #020617;
      --shadow: 0 12px 32px rgba(15,23,42,.08);
      --shadow-hover: 0 20px 48px rgba(185,28,28,.12);
      --radius: 20px;
      --container: 1280px; /* ოდნავ გავზარდეთ კონტეინერი 7 ბარათისთვის */
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Sylfaen", "Noto Sans Georgian", "DejaVu Sans", sans-serif;
      background: var(--panel-2); /* ოდნავ ნაცრისფერი ფონი ბარათების გამოსაყოფად */
      color: var(--text);
      font-size: 14px;
      line-height: 1.55;
    }

    a { text-decoration: none; color: inherit; }
    button, input { font: inherit; }
    [hidden] { display: none !important; }
    .container { width: min(var(--container), calc(100% - 36px)); margin-inline: auto; }

    /* ნავიგაცია */
    .header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(255,255,255,.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--line);
    }
    .nav {
      min-height: 74px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: -.02em;
    }
    .logo {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: #b91c1c;
      color: #fff;
      font-weight: 900;
      font-size: .95rem;
      line-height: 1;
      letter-spacing: -.02em;
      text-transform: uppercase;
      box-shadow: 0 8px 20px rgba(185,28,28,.25);
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 22px;
      color: var(--muted-2);
      font-size: 13px;
      font-weight: 600;
    }
    .nav-links a { position: relative; transition: color .2s; }
    .nav-links a:hover,
    .nav-links a.active { color: var(--text); }
    .nav-links a.active::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 0;
      width: 100%;
      height: 2px;
      background: var(--red);
      border-radius: 2px;
    }
    .nav-actions { display: flex; align-items: center; gap: 10px; }
    .nav-actions .btn {
      min-height: 46px;
      padding: 0 18px;
      font-size: 13px;
    }
    .nav-actions .btn-white {
      background: var(--red);
      color: #fff;
      border: none;
      box-shadow: 0 6px 14px rgba(185,28,28,.2);
    }
    .nav-actions .btn-white:hover { background: var(--red-2); transform: translateY(-3px); }
    .nav-actions .btn-red {
      background: #0f172a;
      color: #fff;
      border-color: #0f172a;
      box-shadow: 0 6px 14px rgba(15,23,42,.15);
    }
    .nav-actions .btn-red:hover { background: #1e293b; transform: translateY(-3px); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 20px;
      border-radius: 999px;
      border: 1px solid transparent;
      font-size: 13px;
      font-weight: 800;
      transition: .25s ease;
      white-space: nowrap;
      cursor: pointer;
    }
    .btn-red { background: var(--red); color: #fff; box-shadow: 0 8px 20px rgba(185,28,28,.25); }
    .btn-red:hover { background: var(--red-2); transform: translateY(-2px); }
    .btn-white { background: #fff; color: var(--text); border: 1px solid var(--line); }
    .btn-white:hover { background: #eef2f6; transform: translateY(-2px); }

    /* ჰერო (სათაურის) სექცია */
    .hero {
      background: #fff;
      padding: 26px 0 20px;
      border-bottom: 1px solid var(--line);
    }
    .hero h1 {
      margin: 0 0 10px;
      font-size: 2rem;
      font-weight: 950;
      letter-spacing: -.03em;
    }
    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: .9rem;
      max-width: 600px;
    }

    /* ფილტრების სექცია */
    .filter-section {
      background: #fff;
      padding: 16px 0;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 74px; /* ჰედერის ქვემოთ დაფიქსირება */
      z-index: 990;
    }
    
    .search-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
    }
    .search-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 999px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      max-width: 400px;
    }
    .search-input {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      font-size: .9rem;
    }
    .result-count {
      font-weight: 800;
      color: var(--red);
      font-size: .95rem;
    }

    /* ფილტრების ჯგუფები */
    .filter-group {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }
    .filter-group:last-child { margin-bottom: 0; }
    .filter-label {
      font-size: .8rem;
      font-weight: 800;
      color: var(--muted);
      margin-right: 8px;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    
    .chip-btn {
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--muted-2);
      font-size: .8rem;
      font-weight: 700;
      cursor: pointer;
      transition: .2s ease;
    }
    .chip-btn:hover { border-color: var(--red); color: var(--red); }
    .chip-btn.active {
      background: var(--red);
      border-color: var(--red);
      color: #fff;
    }

    /* მოთამაშეების ბადე (6-7 თითო ხაზში) */
    .players-section { padding: 24px 0 64px; }
    .players-grid {
      display: grid;
      /* მინიმალური სიგანე 160px უზრუნველყოფს 6-7 ბარათს დიდ ეკრანზე */
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 14px;
    }

    /* ბარათის დიზაინი (დიდი სურათი, პატარა ტექსტი) */
    .player-card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow);
      transition: .25s ease;
      position: relative;
    }
    .player-card:hover {
      transform: translateY(-5px);
      border-color: rgba(185,28,28,.4);
      box-shadow: var(--shadow-hover);
    }

    .player-photo {
      width: 100%;
      aspect-ratio: 4/5;
      background: var(--panel-3);
      object-fit: cover;
      display: block;
    }
    .player-photo--fallback{
      width:100%;
      aspect-ratio:4/5;
      display:grid;
      place-items:center;
      background:linear-gradient(135deg,#0f172a,#334155);
      color:#fff;
      font-size:2rem;
      font-weight:900;
      letter-spacing:-.04em;
    }

    .pos-indicator {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      color: #fff;
      padding: 4px 8px;
      border-radius: 8px;
      font-size: .7rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    .player-info {
      padding: 12px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .player-name {
      margin: 0 0 6px;
      font-size: 1rem;
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -.02em;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 12px;
    }
    .meta-item {
      display: flex;
      flex-direction: column;
    }
    .meta-item span {
      font-size: 0.65rem;
      color: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
    }
    .meta-item strong {
      font-size: 0.8rem;
      color: var(--text);
      font-weight: 800;
    }

    /* პატარა შესვლის ღილაკი */
    .btn-enter {
      width: 100%;
      margin-top: auto;
      padding: 8px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 12px;
      color: var(--red);
      font-size: .8rem;
      font-weight: 800;
      text-align: center;
      transition: .2s ease;
      cursor: pointer;
    }
    .player-card:hover .btn-enter {
      background: var(--red);
      color: #fff;
      border-color: var(--red);
    }

    @media (max-width: 768px) {
      .players-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
      .search-row { flex-direction: column; align-items: stretch; }
      .search-wrap { max-width: 100%; }
      .nav-links { display: none; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="container nav">
      <a href="index.html" class="brand">
        <span class="logo">DM</span>
      <span>Football Georgia</span>
      </a>
      <nav class="nav-links">
        <a href="index.html">მთავარი</a>
        <a href="gundebi.html">გუნდები</a>
        <a href="pexburtelebi.html" class="active">ფეხბურთელები</a>
        <a href="coaching.html">ქოუჩინგი</a>
        <a href="banakebi.html">ბანაკები</a>
        <a href="cxrilebi.html">ცხრილები</a>
        <a href="gamokitkhvebi.html">გამოკითხვები</a>
      </nav>
      <div class="nav-actions" id="playersAuthNav">
        <a href="login.html?redirect=pexburtelebi.html%23login#login" class="btn btn-white">შესვლა</a>
        <a href="login.html?redirect=pexburtelebi.html%23register#register" class="btn btn-red">რეგისტრაცია</a>
      </div>
    </div>
  </header>

  <section class="hero">
    <div class="container">
      <h1>ტალანტების ბაზა</h1>
      <p>აღმოაჩინე 1000+ ახალგაზრდა ფეხბურთელი. გაფილტრე ასაკის და პოზიციის მიხედვით.</p>
    </div>
  </section>

  <div class="filter-section">
    <div class="container">
      
      <div class="search-row">
        <label class="search-wrap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input id="searchInput" class="search-input" type="text" placeholder="მოძებნე სახელით...">
        </label>
        <div class="result-count" id="resultCount">ნაპოვნია: 30</div>
      </div>

      <div class="filter-group" id="posFilters">
        <span class="filter-label">პოზიცია:</span>
        <button class="chip-btn active" data-pos="all">ყველა</button>
        <button class="chip-btn" data-pos="fw">თავდამსხმელი</button>
        <button class="chip-btn" data-pos="mf">ნახევარმცველი</button>
        <button class="chip-btn" data-pos="df">მცველი</button>
        <button class="chip-btn" data-pos="gk">მეკარე</button>
      </div>

      <div class="filter-group" id="ageFilters">
        <span class="filter-label">ასაკი:</span>
        <button class="chip-btn active" data-age="all">ყველა</button>
        <button class="chip-btn" data-age="u8">U8</button>
        <button class="chip-btn" data-age="u9">U9</button>
        <button class="chip-btn" data-age="u10">U10</button>
        <button class="chip-btn" data-age="u11">U11</button>
        <button class="chip-btn" data-age="u12">U12</button>
        <button class="chip-btn" data-age="u13">U13</button>
        <button class="chip-btn" data-age="u14">U14</button>
        <button class="chip-btn" data-age="u15">U15</button>
        <button class="chip-btn" data-age="u16">U16</button>
        <button class="chip-btn" data-age="u17">U17</button>
      </div>

    </div>
  </div>

  <section class="players-section">
    <div class="container">
      <div class="players-grid" id="playersGrid"></div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-site-data.js"></script>
  <script src="supabase-domain-shared.js"></script>
  <script src="auth-shared.js"></script>
  <script>
    const players = [];
    let extraPlayer = null;

    const playersGrid = document.getElementById('playersGrid');
    const searchInput = document.getElementById('searchInput');
    const resultCount = document.getElementById('resultCount');
    
    // ფილტრების სტატუსი
    let activePos = 'all';
    let activeAge = 'all';

    function calculateAgeFromBirthDate(value) {
      const raw = String(value || '').trim();
      const match = raw.match(/^(\d{2})\.(\d{2})\.(\d{4})$/);
      if (!match) {
        return null;
      }
      const birthDate = new Date(Number(match[3]), Number(match[2]) - 1, Number(match[1]));
      if (Number.isNaN(birthDate.getTime())) {
        return null;
      }
      const today = new Date();
      let age = today.getFullYear() - birthDate.getFullYear();
      const monthDiff = today.getMonth() - birthDate.getMonth();
      if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthDate.getDate())) {
        age -= 1;
      }
      return age;
    }

    function getPositionCode(position) {
      const normalized = String(position || '').toLowerCase();
      if (normalized.includes('მეკარე')) return 'gk';
      if (normalized.includes('დამცველი')) return 'df';
      if (normalized.includes('თავდამსხმ')) return 'fw';
      return 'mf';
    }

    function getInitials(name) {
      return String(name || 'MF')
        .split(/\s+/)
        .filter(Boolean)
        .slice(0, 2)
        .map((part) => part[0]?.toUpperCase() || '')
        .join('') || 'MF';
    }

    function createPlayerCard(player) {
      const fullName = player.name || `${player.first || ''} ${player.last || ''}`.trim();
      const firstName = player.first || fullName.split(' ')[0] || 'მოთამაშე';
      const lastName = player.last || fullName.split(' ').slice(1).join(' ');
      const ageCat = String(player.ageCat || '').toLowerCase();
      const searchText = [firstName, lastName, fullName].filter(Boolean).join(' ').toLowerCase();
      const photo = player.img
        ? `<img src="${player.img}" alt="${firstName}" class="player-photo" loading="lazy">`
        : `<div class="player-photo player-photo--fallback">${getInitials(fullName)}</div>`;
      const actionHref = player.actionHref || `player-profile.html?player=${player.id}&from=pexburtelebi.html`;

      return `
        <article class="player-card" data-pos="${player.pos}" data-age="${ageCat}" data-search="${searchText}">
          ${photo}
          <div class="pos-indicator">${player.pos}</div>
          
          <div class="player-info">
            <h3 class="player-name">${fullName}</h3>
            
            <div class="meta-grid">
              <div class="meta-item">
                <span>კატეგორია</span>
                <strong>${ageCat.toUpperCase()} (${player.age} წ.)</strong>
              </div>
              <div class="meta-item">
                <span>ფეხი</span>
                <strong>${player.foot}</strong>
              </div>
            </div>
            
            <a href="${actionHref}" class="btn-enter">${player.actionLabel || 'პროფილი'}</a>
          </div>
        </article>
      `;
    }

    function renderPlayers() {
      const list = extraPlayer ? [extraPlayer, ...players] : players;
      playersGrid.innerHTML = list.map(createPlayerCard).join('');
    }

    function applyFilters() {
      const term = searchInput.value.trim().toLowerCase();
      const cards = playersGrid.querySelectorAll('.player-card');
      let visible = 0;

      cards.forEach((card) => {
        const matchesSearch = card.dataset.search.includes(term);
        const matchesPos = activePos === 'all' || card.dataset.pos === activePos;
        const matchesAge = activeAge === 'all' || card.dataset.age === activeAge;
        
        const show = matchesSearch && matchesPos && matchesAge;
        card.style.display = show ? 'flex' : 'none';
        if (show) visible++;
      });

      resultCount.textContent = `ნაპოვნია: ${visible}`;
    }

    // პოზიციის ღილაკებზე ლისენერი
    document.querySelectorAll('#posFilters .chip-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('#posFilters .chip-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        activePos = e.target.dataset.pos;
        applyFilters();
      });
    });

    // ასაკის ღილაკებზე ლისენერი
    document.querySelectorAll('#ageFilters .chip-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('#ageFilters .chip-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        activeAge = e.target.dataset.age;
        applyFilters();
      });
    });

    searchInput.addEventListener('input', applyFilters);

    // გაშვება
    renderPlayers();
    applyFilters();

    if (window.siteAuth?.renderAuthNav) {
      window.siteAuth.renderAuthNav('#playersAuthNav', {
        currentPath: 'pexburtelebi.html',
        loginClass: 'btn btn-white',
        registerClass: 'btn btn-red',
        profileClass: 'btn btn-red',
        afterLogout: 'pexburtelebi.html'
      });
    }

    async function hydrateOwnPlayerCard() {
      const client = window.siteAuth?.getClient ? window.siteAuth.getClient() : null;
      if (!client) {
        return;
      }

      const { data } = await client.auth.getSession();
      const user = data?.session?.user || null;
      if (!user) {
        return;
      }

      const role = window.siteAuth?.getUserRole ? window.siteAuth.getUserRole(user) : 'player';
      if (role !== 'player' && role !== 'parent') {
        return;
      }

      if (window.sitePlayerDomain?.syncMyAccountDomain) {
        await window.sitePlayerDomain.syncMyAccountDomain(client);
      }

      const managedEntry = window.sitePlayerDomain?.fetchManagedEntry
        ? await window.sitePlayerDomain.fetchManagedEntry(client, user.id)
        : null;

      if (managedEntry) {
        const parts = managedEntry.fullName.split(/\s+/).filter(Boolean);
        extraPlayer = {
          id: managedEntry.id || 'self',
          first: parts[0] || managedEntry.fullName,
          last: parts.slice(1).join(' '),
          name: managedEntry.fullName,
          pos: getPositionCode(managedEntry.positionLabel || managedEntry.position),
          ageCat: String(managedEntry.ageGroup || 'pro').toLowerCase() || 'pro',
          age: managedEntry.age ?? '-',
          foot: managedEntry.foot || 'áƒáƒ  áƒáƒ áƒ˜áƒ¡ áƒ›áƒ˜áƒ—áƒ˜áƒ—áƒ”áƒ‘áƒ£áƒšáƒ˜',
          img: managedEntry.photo || '',
          actionHref: 'user-profile.html?view=overview&from=pexburtelebi.html',
          actionLabel: 'áƒ©áƒ”áƒ›áƒ˜ áƒžáƒ áƒáƒ¤áƒ˜áƒšáƒ˜'
        };

        renderPlayers();
        applyFilters();
        return;
      }

      const profile = user.user_metadata?.profile || {};
      const displayName = role === 'parent'
        ? (String(profile.childName || '').trim() || 'შენი ბავშვი')
        : (window.siteAuth?.getUserDisplayName ? window.siteAuth.getUserDisplayName(user) : (user.email || 'შენი პროფილი'));
      const parts = displayName.split(/\s+/).filter(Boolean);
      extraPlayer = {
        id: 'self',
        first: parts[0] || displayName,
        last: parts.slice(1).join(' '),
        name: displayName,
        pos: getPositionCode(role === 'parent' ? profile.childPosition : profile.playerPosition),
        ageCat: String(role === 'parent' ? profile.childAgeCategory : profile.playerAgeCategory || 'pro').toLowerCase() || 'pro',
        age: role === 'parent'
          ? (calculateAgeFromBirthDate(profile.childBirthDate) ?? profile.childAge ?? '-')
          : (calculateAgeFromBirthDate(profile.playerBirthDate) ?? profile.playerAge ?? '-'),
        foot: role === 'parent'
          ? (profile.childFoot || 'არ არის მითითებული')
          : (profile.playerFoot || 'არ არის მითითებული'),
        img: role === 'parent'
          ? (profile.childPhoto || profile.profilePhoto || '')
          : (profile.playerPhoto || profile.profilePhoto || ''),
        actionHref: 'user-profile.html?view=overview&from=pexburtelebi.html',
        actionLabel: 'ჩემი პროფილი'
      };

      renderPlayers();
      applyFilters();
    }

    hydrateOwnPlayerCard();
  </script>
  <script>
    (async function () {
      const client = window.siteAuth?.getClient ? window.siteAuth.getClient() : null;
      if (!client || !window.siteData?.fetchPublicPlayers) {
        return;
      }

      const playersGridNode = document.getElementById('playersGrid');
      const resultCountNode = document.getElementById('resultCount');
      const searchNode = document.getElementById('searchInput');
      const positionFilters = document.querySelectorAll('#posFilters .chip-btn');
      const ageFilters = document.querySelectorAll('#ageFilters .chip-btn');

      let pagePlayers = await window.siteData.fetchPublicPlayers(client);
      let managedPlayerId = '';

      const { data } = await client.auth.getSession();
      const user = data?.session?.user || null;

      if (user && window.sitePlayerDomain?.syncMyAccountDomain) {
        await window.sitePlayerDomain.syncMyAccountDomain(client);
      }

      if (user && window.sitePlayerDomain?.fetchManagedEntry && window.siteData?.enrichPlayer) {
        const managedEntry = await window.sitePlayerDomain.fetchManagedEntry(client, user.id);
        const managedPlayer = managedEntry ? window.siteData.enrichPlayer(managedEntry) : null;
        if (managedPlayer?.id) {
          managedPlayerId = managedPlayer.id;
          const existingIndex = pagePlayers.findIndex(function (player) {
            return String(player.id) === String(managedPlayer.id);
          });

          if (existingIndex >= 0) {
            pagePlayers[existingIndex] = { ...pagePlayers[existingIndex], ...managedPlayer };
          } else {
            pagePlayers.unshift(managedPlayer);
          }
        }
      }

      pagePlayers.sort(function (a, b) {
        if ((b.votesCount || 0) !== (a.votesCount || 0)) {
          return (b.votesCount || 0) - (a.votesCount || 0);
        }
        return String(a.fullName || '').localeCompare(String(b.fullName || ''), 'ka');
      });

      function escapeHtml(value) {
        return String(value || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function initials(name) {
        return String(name || 'MF')
          .split(/\s+/)
          .filter(Boolean)
          .slice(0, 2)
          .map(function (part) { return part[0] ? part[0].toUpperCase() : ''; })
          .join('') || 'MF';
      }

      function renderDynamicPlayers() {
        playersGridNode.innerHTML = pagePlayers.map(function (player) {
          const fullName = String(player.fullName || '').trim();
          const ageGroup = String(player.ageGroup || 'pro').toLowerCase();
          const searchText = [fullName, player.team || '', player.positionLabel || ''].join(' ').toLowerCase();
          const positionCode = player.positionCode || 'MF';
          const isManaged = managedPlayerId && String(player.id) === String(managedPlayerId);
          const actionHref = isManaged
            ? 'user-profile.html?view=overview&from=pexburtelebi.html'
            : window.siteData.buildPlayerHref(player.id, 'pexburtelebi.html');
          const photoMarkup = player.photo
            ? `<img src="${escapeHtml(player.photo)}" alt="${escapeHtml(fullName)}" class="player-photo" loading="lazy">`
            : `<div class="player-photo player-photo--fallback">${initials(fullName)}</div>`;

          return `
            <article class="player-card" data-pos="${escapeHtml(positionCode.toLowerCase())}" data-age="${escapeHtml(ageGroup)}" data-search="${escapeHtml(searchText)}">
              ${photoMarkup}
              <div class="pos-indicator">${escapeHtml(positionCode)}</div>
              <div class="player-info">
                <h3 class="player-name">${escapeHtml(fullName)}</h3>
                <div class="meta-grid">
                  <div class="meta-item">
                    <span>კატეგორია</span>
                    <strong>${escapeHtml(player.ageLabel || ageGroup.toUpperCase())} (${escapeHtml(String(player.age ?? '-'))} წ.)</strong>
                  </div>
                  <div class="meta-item">
                    <span>ფეხი</span>
                    <strong>${escapeHtml(player.foot || 'არ არის მითითებული')}</strong>
                  </div>
                </div>
                <a href="${actionHref}" class="btn-enter">${isManaged ? 'ჩემი პროფილი' : 'პროფილი'}</a>
              </div>
            </article>
          `;
        }).join('');
      }

      function activeValue(nodes) {
        const activeNode = Array.from(nodes).find(function (button) {
          return button.classList.contains('active');
        });
        return activeNode ? String(activeNode.dataset.pos || activeNode.dataset.age || 'all') : 'all';
      }

      function updateVisibleCount() {
        const term = String(searchNode?.value || '').trim().toLowerCase();
        const currentPos = activeValue(positionFilters);
        const currentAge = activeValue(ageFilters);
        const cards = playersGridNode.querySelectorAll('.player-card');
        let visible = 0;

        cards.forEach(function (card) {
          const matchesSearch = card.dataset.search.includes(term);
          const matchesPos = currentPos === 'all' || card.dataset.pos === currentPos;
          const matchesAge = currentAge === 'all' || card.dataset.age === currentAge;
          const show = matchesSearch && matchesPos && matchesAge;
          card.style.display = show ? 'flex' : 'none';
          if (show) {
            visible += 1;
          }
        });

        resultCountNode.textContent = `ნაპოვნია: ${visible}`;
      }

      renderDynamicPlayers();
      updateVisibleCount();

      if (searchNode) {
        searchNode.addEventListener('input', updateVisibleCount);
      }
      positionFilters.forEach(function (button) {
        button.addEventListener('click', updateVisibleCount);
      });
      ageFilters.forEach(function (button) {
        button.addEventListener('click', updateVisibleCount);
      });
    })();
  </script>
</body>
</html>
