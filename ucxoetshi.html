<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>უცხოეთში მყოფი ქართველები | Football Georgia</title>
  <meta name="description" content="Football Georgia — საზღვარგარეთ მოღვაწე ქართველი ფეხბურთელები. გაფილტრე პოზიციით, ასაკობრივი კატეგორიით ან სახელით.">
  <style>
    :root {
      --bg: #ffffff;
      --panel: #ffffff;
      --panel-2: #f8fafc;
      --panel-3: #eef2f6;
      --text: #0b1220;
      --muted: #344054;
      --muted-2: #1f2937;
      --line: rgba(16,24,40,0.12);
      --line-2: rgba(16,24,40,0.22);
      --red: #b91c1c;
      --red-2: #991b1b;
      --black: #020617;
      --shadow: 0 12px 32px rgba(15,23,42,.08);
      --shadow-hover: 0 20px 48px rgba(185,28,28,.12);
      --radius: 20px;
      --container: 1280px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Sylfaen", "Noto Sans Georgian", "DejaVu Sans", sans-serif;
      background: var(--panel-2);
      color: var(--text);
      font-size: 14px;
      line-height: 1.55;
    }

    a { text-decoration: none; color: inherit; }
    button, input { font: inherit; }
    [hidden] { display: none !important; }
    .container { width: min(var(--container), calc(100% - 36px)); margin-inline: auto; }

    .header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(255,255,255,.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--line);
    }
    .nav {
      min-height: 74px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: -.02em;
    }
    .logo {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: #b91c1c;
      color: #fff;
      font-weight: 900;
      font-size: .95rem;
      line-height: 1;
      letter-spacing: -.02em;
      text-transform: uppercase;
      box-shadow: 0 8px 20px rgba(185,28,28,.25);
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 22px;
      color: var(--muted-2);
      font-size: 13px;
      font-weight: 600;
    }
    .nav-links a { position: relative; transition: color .2s; }
    .nav-links a:hover,
    .nav-links a.active { color: var(--text); }
    .nav-links a.active::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 0;
      width: 100%;
      height: 2px;
      background: var(--red);
      border-radius: 2px;
    }
    .nav-actions { display: flex; align-items: center; gap: 10px; }
    .nav-actions .btn {
      min-height: 46px;
      padding: 0 18px;
      font-size: 13px;
    }
    .nav-actions .btn-white {
      background: var(--red);
      color: #fff;
      border: none;
      box-shadow: 0 6px 14px rgba(185,28,28,.2);
    }
    .nav-actions .btn-white:hover { background: var(--red-2); transform: translateY(-3px); }
    .nav-actions .btn-red {
      background: #0f172a;
      color: #fff;
      border-color: #0f172a;
      box-shadow: 0 6px 14px rgba(15,23,42,.15);
    }
    .nav-actions .btn-red:hover { background: #1e293b; transform: translateY(-3px); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 20px;
      border-radius: 999px;
      border: 1px solid transparent;
      font-size: 13px;
      font-weight: 800;
      transition: .25s ease;
      white-space: nowrap;
      cursor: pointer;
    }
    .btn-red { background: var(--red); color: #fff; box-shadow: 0 8px 20px rgba(185,28,28,.25); }
    .btn-red:hover { background: var(--red-2); transform: translateY(-2px); }
    .btn-white { background: #fff; color: var(--text); border: 1px solid var(--line); }
    .btn-white:hover { background: #eef2f6; transform: translateY(-2px); }

    .hero {
      background: #fff;
      padding: 14px 0 12px;
      border-bottom: 1px solid var(--line);
    }
    .hero-inner {
      display: flex;
      align-items: baseline;
      gap: 16px;
      flex-wrap: wrap;
    }
    .hero h1 {
      margin: 0;
      font-size: 1.45rem;
      font-weight: 950;
      letter-spacing: -.03em;
      white-space: nowrap;
    }
    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: .85rem;
    }

    .filter-section {
      background: #fff;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 74px;
      z-index: 990;
    }

    .search-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }
    .search-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      border-radius: 999px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      max-width: 380px;
    }
    .search-input {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      font-size: .9rem;
    }
    .result-count {
      font-weight: 800;
      color: var(--red);
      font-size: .9rem;
      white-space: nowrap;
    }

    .filter-combined {
      display: flex;
      align-items: center;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      padding-bottom: 2px;
    }
    .filter-combined::-webkit-scrollbar { display: none; }
    .filter-divider {
      width: 1px;
      height: 20px;
      background: var(--line-2, var(--line));
      flex-shrink: 0;
      margin: 0 6px;
    }
    .filter-label {
      font-size: .75rem;
      font-weight: 800;
      color: var(--muted);
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: .05em;
      flex-shrink: 0;
    }

    .chip-btn {
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--muted-2);
      font-size: .8rem;
      font-weight: 700;
      cursor: pointer;
      transition: .2s ease;
    }
    .chip-btn:hover { border-color: var(--red); color: var(--red); }
    .chip-btn.active {
      background: var(--red);
      border-color: var(--red);
      color: #fff;
    }

    .players-section { padding: 24px 0 64px; }
    .players-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 14px;
    }

    .player-card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow);
      transition: .25s ease;
      position: relative;
      cursor: pointer;
    }
    .player-card:hover {
      transform: translateY(-5px);
      border-color: rgba(185,28,28,.4);
      box-shadow: var(--shadow-hover);
    }
    .player-photo-link { display: block; line-height: 0; }
    .player-name a { color: inherit; text-decoration: none; }
    .player-name a:hover { text-decoration: underline; }

    .player-photo {
      width: 100%;
      aspect-ratio: 4/5;
      background: var(--panel-3);
      object-fit: cover;
      display: block;
    }
    .player-photo--fallback {
      width: 100%;
      aspect-ratio: 4/5;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg,#0f172a,#334155);
      color: #fff;
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: -.04em;
    }

    .pos-indicator {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      color: #fff;
      padding: 4px 8px;
      border-radius: 8px;
      font-size: .7rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    .player-info {
      padding: 12px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .player-name {
      margin: 0 0 6px;
      font-size: 1rem;
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -.02em;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 12px;
    }
    .meta-item { display: flex; flex-direction: column; }
    .meta-item span {
      font-size: 0.65rem;
      color: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
    }
    .meta-item strong {
      font-size: 0.8rem;
      color: var(--text);
      font-weight: 800;
    }

    .btn-enter {
      width: 100%;
      margin-top: auto;
      padding: 8px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 12px;
      color: var(--red);
      font-size: .8rem;
      font-weight: 800;
      text-align: center;
      transition: .2s ease;
      cursor: pointer;
    }
    .player-card:hover .btn-enter {
      background: var(--red);
      color: #fff;
      border-color: var(--red);
    }

    .btn-prospect {
      width: 100%;
      margin-top: 6px;
      padding: 7px;
      background: #1d4ed8;
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: .78rem;
      font-weight: 800;
      text-align: center;
      cursor: pointer;
      transition: .2s ease;
    }
    .btn-prospect:hover { background: #1e40af; transform: translateY(-1px); }
    .btn-prospect.is-prospect {
      background: #eff6ff;
      color: #1d4ed8;
      border: 1px solid #bfdbfe;
    }
    .btn-prospect.is-prospect:hover { background: #dbeafe; }

    @media (max-width: 768px) {
      .players-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
      .search-row { flex-direction: column; align-items: stretch; }
      .search-wrap { max-width: 100%; }
      .nav-links { display: none; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="container nav">
      <a href="index.html" class="brand">
        <span class="logo">DM</span>
        <span>Football Georgia</span>
      </a>
      <nav class="nav-links">
        <a href="index.html">მთავარი</a>
        <a href="gundebi.html">გუნდები</a>
        <a href="pexburtelebi.html">ფეხბურთელები</a>
        <a href="ucxoetshi.html" class="active">საზღვარგარეთ</a>
        <a href="coaching.html">ქოუჩინგი</a>
        <a href="banakebi.html">ბანაკები</a>
        <a href="cxrilebi.html">ცხრილები</a>
      </nav>
      <div class="nav-actions" id="abroadAuthNav"></div>
    </div>
  </header>

  <section class="hero">
    <div class="container">
      <div class="hero-inner">
        <h1>უცხოეთში მყოფი ქართველები</h1>
        <p>საზღვარგარეთ მოღვაწე ქართველი ფეხბურთელები. გაფილტრე პოზიციით ან ასაკობრივი კატეგორიით.</p>
      </div>
    </div>
  </section>

  <div class="filter-section">
    <div class="container">

      <div class="search-row">
        <label class="search-wrap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input id="searchInput" class="search-input" type="text" placeholder="მოძებნე სახელით...">
        </label>
        <div class="result-count" id="resultCount">ნაპოვნია: 0</div>
      </div>

      <div class="filter-combined">
        <span class="filter-label">პოზიცია:</span>
        <span id="posFilters" style="display:contents;">
          <button class="chip-btn active" data-pos="all">ყველა</button>
          <button class="chip-btn" data-pos="fw">თავდამსხმელი</button>
          <button class="chip-btn" data-pos="mf">ნახევარმცველი</button>
          <button class="chip-btn" data-pos="df">მცველი</button>
          <button class="chip-btn" data-pos="gk">მეკარე</button>
        </span>
        <div class="filter-divider"></div>
        <span class="filter-label">ასაკი:</span>
        <span id="ageFilters" style="display:contents;">
          <button class="chip-btn active" data-age="all">ყველა</button>
          <button class="chip-btn" data-age="u8">U8</button>
          <button class="chip-btn" data-age="u9">U9</button>
          <button class="chip-btn" data-age="u10">U10</button>
          <button class="chip-btn" data-age="u11">U11</button>
          <button class="chip-btn" data-age="u12">U12</button>
          <button class="chip-btn" data-age="u13">U13</button>
          <button class="chip-btn" data-age="u14">U14</button>
          <button class="chip-btn" data-age="u15">U15</button>
          <button class="chip-btn" data-age="u16">U16</button>
          <button class="chip-btn" data-age="u17">U17</button>
        </span>
      </div>

    </div>
  </div>

  <section class="players-section">
    <div class="container">
      <div class="players-grid" id="playersGrid"></div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth-shared.js"></script>
  <script src="supabase-domain-shared.js"></script>
  <script src="supabase-site-data.js"></script>
  <script>
    (async function () {
      var abroadAuthNav = document.getElementById('abroadAuthNav');
      try {
        if (window.siteAuth && window.siteAuth.renderAuthNav) {
          await window.siteAuth.renderAuthNav('#abroadAuthNav', {
            currentPath: 'ucxoetshi.html',
            loginClass: 'btn btn-white',
            registerClass: 'btn btn-red',
            profileClass: 'btn btn-red',
            afterLogout: 'ucxoetshi.html'
          });
        }
      } catch (e) {}
      if (abroadAuthNav && !abroadAuthNav.querySelector('a,button')) {
        abroadAuthNav.innerHTML = '<a href="login.html?redirect=ucxoetshi.html%23login#login" class="btn btn-white">შესვლა</a><a href="login.html?redirect=ucxoetshi.html%23register#register" class="btn btn-red">რეგისტრაცია</a>';
      }

      var client = window.siteAuth && window.siteAuth.getClient ? window.siteAuth.getClient() : null;
      var playersGridNode = document.getElementById('playersGrid');
      var resultCountNode = document.getElementById('resultCount');
      var searchNode = document.getElementById('searchInput');
      var positionFilters = document.querySelectorAll('#posFilters .chip-btn');
      var ageFilters = document.querySelectorAll('#ageFilters .chip-btn');

      var pagePlayers = [];

      function escapeHtml(value) {
        return String(value || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function initials(name) {
        return String(name || 'MF')
          .split(/\s+/)
          .filter(Boolean)
          .slice(0, 2)
          .map(function (part) { return part[0] ? part[0].toUpperCase() : ''; })
          .join('') || 'MF';
      }

      var POS_LABEL = { GK: 'მეკარე', DF: 'დამცველი', MF: 'ნახევარმცველი', FW: 'თავდამსხმელი' };

      function renderPlayers() {
        if (!playersGridNode) { return; }

        if (!pagePlayers.length) {
          playersGridNode.innerHTML = [
            '<article class="player-card" style="grid-column:1 / -1; min-height:auto; align-items:flex-start;">',
            '<div class="player-info" style="width:100%;">',
            '<h3 class="player-name">რეგისტრირებული მოთამაშეები ჯერ არ ჩანს</h3>',
            '<div class="meta-grid" style="margin-top:10px;">',
            '<div class="meta-item" style="grid-column:1 / -1;">',
            '<span>მდგომარეობა</span>',
            '<strong>როცა ინდექსიდან გაივლის რეგისტრაცია, მოთამაშეები აქ გამოჩნდება.</strong>',
            '</div></div></div></article>'
          ].join('');
          if (resultCountNode) { resultCountNode.textContent = 'ნაპოვნია: 0'; }
          return;
        }

        playersGridNode.innerHTML = pagePlayers.map(function (player) {
          var fullName    = escapeHtml(player.fullName || '');
          var posCode     = escapeHtml((player.position || 'MF').toUpperCase());
          var posLabel    = escapeHtml(POS_LABEL[player.position] || player.position || '—');
          var country     = escapeHtml(player.country || '—');
          var club        = escapeHtml(player.clubName || '—');
          var birthYear   = player.birthYear ? escapeHtml(String(player.birthYear)) : '—';
          var age         = player.birthYear ? String(new Date().getFullYear() - player.birthYear) + ' წ.' : '—';
          var searchText  = [player.fullName, player.country, player.clubName, player.position].join(' ').toLowerCase();

          return (
            '<article class="player-card"' +
            ' data-pos="' + (player.position || 'mf').toLowerCase() + '"' +
            ' data-age="all"' +
            ' data-search="' + searchText + '">' +
            '<div class="player-photo player-photo--fallback">' + initials(player.fullName) + '</div>' +
            '<div class="pos-indicator">' + posCode + '</div>' +
            '<div class="player-info">' +
            '<h3 class="player-name">' + fullName + '</h3>' +
            '<div class="meta-grid">' +
            '<div class="meta-item"><span>პოზიცია</span><strong>' + posLabel + '</strong></div>' +
            '<div class="meta-item"><span>ასაკი</span><strong>' + age + '</strong></div>' +
            '<div class="meta-item"><span>ქვეყანა</span><strong>' + country + '</strong></div>' +
            '<div class="meta-item"><span>კლუბი</span><strong>' + club + '</strong></div>' +
            '</div>' +
            '</div></article>'
          );
        }).join('');
      }

      function activeFilterValue(nodes) {
        var activeNode = Array.from(nodes).find(function (button) {
          return button.classList.contains('active');
        });
        return activeNode ? String(activeNode.dataset.pos || activeNode.dataset.age || 'all') : 'all';
      }

      function applyFilters() {
        var term = String(searchNode && searchNode.value || '').trim().toLowerCase();
        var currentPos = activeFilterValue(positionFilters);
        var currentAge = activeFilterValue(ageFilters);
        var cards = playersGridNode ? Array.from(playersGridNode.querySelectorAll('.player-card')) : [];
        var visible = 0;

        cards.forEach(function (card) {
          var matchesSearch = String(card.dataset.search || '').includes(term);
          var matchesPos = currentPos === 'all' || card.dataset.pos === currentPos;
          var matchesAge = currentAge === 'all' || card.dataset.age === currentAge;
          var show = matchesSearch && matchesPos && matchesAge;
          card.style.display = show ? 'flex' : 'none';
          if (show) { visible += 1; }
        });

        if (resultCountNode) {
          resultCountNode.textContent = 'ნაპოვნია: ' + visible;
        }
      }

      if (searchNode) { searchNode.addEventListener('input', applyFilters); }
      positionFilters.forEach(function (button) {
        button.addEventListener('click', function () {
          positionFilters.forEach(function (b) { b.classList.remove('active'); });
          button.classList.add('active');
          applyFilters();
        });
      });
      ageFilters.forEach(function (button) {
        button.addEventListener('click', function () {
          ageFilters.forEach(function (b) { b.classList.remove('active'); });
          button.classList.add('active');
          applyFilters();
        });
      });

      if (playersGridNode) {
        playersGridNode.addEventListener('click', function (e) {
          if (e.target.closest('a, button')) { return; }
          var card = e.target.closest('.player-card');
          if (!card || !card.dataset.href) { return; }
          window.location.href = card.dataset.href;
        });
      }

      if (!client) {
        renderPlayers();
        applyFilters();
        return;
      }

      try {
        var result = await client
          .from('abroad_registrations')
          .select('id, full_name, birth_year, position, country, club_name, registrant_type, created_at')
          .order('created_at', { ascending: false });

        if (result.error) { throw result.error; }

        pagePlayers = (result.data || []).map(function (row) {
          return {
            id:            String(row.id || ''),
            fullName:      String(row.full_name || '').trim(),
            position:      String(row.position || 'MF').toUpperCase(),
            country:       String(row.country || '').trim(),
            clubName:      String(row.club_name || '').trim(),
            birthYear:     row.birth_year ? Number(row.birth_year) : null,
            registrantType: String(row.registrant_type || 'player')
          };
        });
      } catch (fetchErr) {
        if (playersGridNode) {
          playersGridNode.innerHTML = [
            '<article class="player-card" style="grid-column:1 / -1; min-height:auto; align-items:flex-start;">',
            '<div class="player-info" style="width:100%;">',
            '<h3 class="player-name">ჩატვირთვის შეცდომა</h3>',
            '<div class="meta-grid" style="margin-top:10px;">',
            '<div class="meta-item" style="grid-column:1 / -1;">',
            '<span>მდგომარეობა</span>',
            '<strong>მონაცემების ჩატვირთვა ვერ მოხერხდა. გადაამოწმე ინტერნეტ კავშირი და განაახლე გვერდი.</strong>',
            '</div></div></div></article>'
          ].join('');
          if (resultCountNode) { resultCountNode.textContent = 'ნაპოვნია: 0'; }
        }
        return;
      }

      renderPlayers();
      applyFilters();
    })();
  </script>
</body>
</html>
